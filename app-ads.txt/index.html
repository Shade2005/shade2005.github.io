<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App-Ads.txt - Dua Connect</title>
    <style>
        :root {
            --bg-color: #EBE6D9;
            --text-primary: #A68A64;
            --text-secondary: #7D6B50;
            --accent-color: #C5B08D;
            --white: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            background-color: var(--white);
            width: 100%;
            padding: 15px 0;
            box-shadow: 0 2px 10px rgba(166, 138, 100, 0.1);
            display: flex;
            justify-content: center;
            gap: 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--text-secondary);
        }

        .container {
            background-color: var(--white);
            max-width: 800px;
            margin: 40px 20px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(166, 138, 100, 0.1);
            width: 100%;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 20px;
        }

        h1 {
            color: var(--text-primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 800;
        }

        pre {
            background-color: #f8f8f8;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--bg-color);
            overflow-x: auto;
            color: var(--text-secondary);
            font-family: "Courier New", Courier, monospace;
            font-size: 1rem;
        }

        .description {
            margin-bottom: 30px;
        }

        .footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }
        
        .btn {
            display: inline-block;
            background-color: var(--text-primary);
            color: var(--white);
            padding: 10px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: var(--text-secondary);
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .container {
                margin: 20px 10px;
                padding: 20px;
                box-shadow: none;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="ads.html">App-Ads.txt</a>
    </nav>

    <div class="container">
        <header>
            <h1>App-Ads.txt</h1>
        </header>

        <div class="description">
            <p>Authorized Sellers for <strong>Dua Connect</strong>. This file helps ensure that our advertising inventory is only sold through authorized channels.</p>
        </div>

        <pre>google.com, pub-3430450633601151, DIRECT, f08c47fec0942fa0</pre>
        
        <div style="text-align: center;">
            <a href="app-ads.txt" class="btn">View Raw File</a>
        </div>

        <div class="footer">
            &copy; 2026 Dua Connect. All rights reserved.
        </div>
    </div>

</body>
</html>
